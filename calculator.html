<script>
function press(value)
{
let val= value;

function clear_all()
{
	document.getElementById('input_box').value = "";
}
function backspace()
{
	let item = document.getElementById('input_box') ;
	//console.log(item)
	item.value = item.value.slice(0,-1);
	
}
function add(value)
{
let val = value;
let a = document.getElementById('input_box').value;
console.log(a)
document.getElementById('input_box').value += val;
}
function result()
{
	let a = eval(document.getElementById('input_box').value);
